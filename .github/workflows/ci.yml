name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Rust runtime: format, lint, and unit tests. Independent gate, runs in parallel
  # with `build` — a runtime regression fails CI on its own.
  runtime:
    name: runtime (cargo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v7

      # edition 2024 needs a recent stable toolchain; the repo's rust-toolchain
      # (if any) is honored, otherwise this pins the components we need.
      - name: Install Rust
        run:
          rustup toolchain install stable --profile minimal --component
          rustfmt,clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

  # Build the self-contained SDK ONCE (runtime + embedded front-end + stdlib), so
  # the suite shards need no toolchain and no per-shard rebuild. This is also the
  # only place the self-hosting fixpoint is checked — bin/build_sdk.sh re-emits the
  # front-end from the built SDK and fails if the bytes don't match. NOTE: a PR
  # that adds syntax consumed by pkgs/cli must refresh bootstrap/frontend.thera-bc
  # or this job goes red at the fixpoint step (see bootstrap/README.md).
  build:
    name: build (sdk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime

      - name: bin/build_sdk.sh (emit + embed + fixpoint check)
        run: bin/build_sdk.sh

      # tar the tree so the executable bit on build/sdk/bin/thera survives the
      # upload/download round-trip (upload-artifact does not preserve modes).
      - name: package sdk
        run: tar -czf sdk.tgz -C build sdk

      - uses: actions/upload-artifact@v4
        with:
          name: sdk
          path: sdk.tgz
          retention-days: 1

  # Self-hosted suite, sharded across parallel jobs. Each shard downloads the
  # prebuilt SDK and runs its bin/test.sh group(s) against it via THERA_LAUNCHER —
  # no rustup, no cargo, no front-end rebuild. `cargo` is omitted (the runtime job
  # runs it). The `stdlib` group is the current long pole and gets its own shard;
  # everything else consolidates into `rest`.
  suite:
    name: suite (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: stdlib
            groups: stdlib
          - name: rest
            groups: frontend checks conformance examples
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v4
        with:
          name: sdk

      - name: unpack sdk
        run: tar -xzf sdk.tgz

      - name: bin/test.sh ${{ matrix.groups }}
        env:
          THERA_LAUNCHER: ${{ github.workspace }}/build/sdk/bin/thera
        run: bin/test.sh ${{ matrix.groups }}
