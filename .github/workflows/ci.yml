name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Rust runtime: format, lint, and unit tests. Independent gate, runs in parallel
  # with `build` — a runtime regression fails CI on its own. Uses the runner's
  # preinstalled toolchain (rustup default profile: cargo + rustfmt + clippy),
  # which tracks a recent stable — no explicit `rustup install` step.
  runtime:
    name: runtime (cargo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v7

      - name: toolchain
        run: rustc --version && cargo --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

  # Build the SDK ONCE (runtime + front-end + stdlib), so the suite shards need no
  # toolchain and no per-shard rebuild. This is also the only place the
  # self-hosting fixpoint is checked — bin/build_sdk.sh re-emits the front-end from
  # the built SDK and fails if the bytes don't match. NOTE: a PR that adds syntax
  # consumed by pkgs/cli must refresh bootstrap/frontend.thera-bc or this job goes
  # red at the fixpoint step (see bootstrap/README.md).
  #
  # The bare runtime is a pure function of runtime/ source, so it's cached: a PR
  # that doesn't touch runtime/ (the common case) restores the binary and skips
  # both the compile and the toolchain — build_sdk.sh reuses an already-present
  # binary and just re-emits + assembles + fixpoint-checks (~seconds).
  build:
    name: build (sdk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Cache the bare runtime at a path OUTSIDE runtime/target — Swatinem/rust-cache's
      # post-cleanup prunes the workspace binary from target/ before this action's
      # post-save runs, so caching it in place would never save.
      - name: cache the bare runtime
        id: rtcache
        uses: actions/cache@v6
        with:
          path: bin-cache/thera-rt
          key: thera-rt-${{ runner.os }}-${{ hashFiles('runtime/src/**', 'runtime/build.rs', 'runtime/Cargo.toml', 'runtime/Cargo.lock') }}

      # On a hit, drop the cached binary where build_sdk.sh expects it so it skips
      # the compile (and the toolchain) entirely.
      - name: place cached runtime
        if: steps.rtcache.outputs.cache-hit == 'true'
        run: mkdir -p runtime/target/release && cp bin-cache/thera-rt runtime/target/release/thera-rt

      # Only needed to compile the runtime on a cache miss (runtime/ changed).
      - uses: Swatinem/rust-cache@v2
        if: steps.rtcache.outputs.cache-hit != 'true'
        with:
          workspaces: runtime

      - name: bin/build_sdk.sh (emit + assemble + fixpoint check)
        run: bin/build_sdk.sh

      # Stage the freshly built binary for the cache — a normal step, so it runs
      # before rust-cache's post-cleanup would strip it from target/.
      - name: stage runtime for cache
        if: steps.rtcache.outputs.cache-hit != 'true'
        run: mkdir -p bin-cache && cp runtime/target/release/thera-rt bin-cache/thera-rt

      # tar the tree so the executable bit on build/sdk/bin/thera survives the
      # upload/download round-trip (upload-artifact does not preserve modes).
      - name: package sdk
        run: tar -czf sdk.tgz -C build sdk

      - uses: actions/upload-artifact@v7
        with:
          name: sdk
          path: sdk.tgz
          retention-days: 1

  # Self-hosted suite, sharded across parallel jobs. Each shard downloads the
  # prebuilt SDK and runs its bin/test.sh group(s) against it via THERA_LAUNCHER —
  # no rustup, no cargo, no front-end rebuild. `cargo` is omitted (the runtime job
  # runs it). The groups are split three ways to keep the shards roughly balanced
  # (~equal wall-clock, no quick-vs-long outlier); `checks` is the largest single
  # group, so it anchors its own shard. Re-measure and re-bucket if a group grows.
  suite:
    name: suite (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: suites
            groups: frontend stdlib
          - name: spec
            groups: conformance examples
          - name: guards
            groups: checks
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: sdk

      # The archive root is `sdk/`; extract under build/ so the tree is
      # build/sdk/... to match THERA_LAUNCHER below (and the local layout).
      - name: unpack sdk
        run: mkdir -p build && tar -xzf sdk.tgz -C build

      - name: bin/test.sh ${{ matrix.groups }}
        env:
          THERA_LAUNCHER: ${{ github.workspace }}/build/sdk/bin/thera
        run: bin/test.sh ${{ matrix.groups }}
